<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/icon-192.svg" sizes="192x192" type="image/svg+xml">
  <title>A.A.C - Flight School</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="offline-banner hidden" id="offline-banner">No internet connection - working offline</div>

  <header class="app-header">
    <div class="header-left">
      <button class="header-btn" id="manage-ac-btn" title="Manage Aircraft">&#9992;</button>
    </div>
    <h1>A.A.C</h1>
    <div class="header-right">
      <span class="ac-selector-wrap">
        <select id="ac-selector" class="ac-selector"></select>
      </span>
      <span class="sync-badge" id="sync-badge"></span>
    </div>
  </header>

  <div id="app"></div>

  <div id="toast" class="toast"></div>
  <input type="file" id="ac-photo-input" accept="image/*" style="display:none">

  <nav class="bottom-nav">
    <a href="#" class="nav-link active" data-view="dashboard">
      <span class="nav-icon">&#127968;</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="#" class="nav-link" data-view="flight-ops">
      <span class="nav-icon">&#9992;</span>
      <span class="nav-label">Flights</span>
    </a>
    <a href="#" class="nav-link" data-view="defects">
      <span class="nav-icon">&#9888;</span>
      <span class="nav-label">Squawks</span>
    </a>
    <a href="#" class="nav-link" data-view="maintenance">
      <span class="nav-icon">&#9881;</span>
      <span class="nav-label">Work</span>
    </a>
    <a href="#" class="nav-link" data-view="inventory">
      <span class="nav-icon">&#128230;</span>
      <span class="nav-label">Stock</span>
    </a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="js/db.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/flight-ops.js"></script>
  <script src="js/defects.js"></script>
  <script src="js/fuel.js"></script>
  <script src="js/maintenance.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
