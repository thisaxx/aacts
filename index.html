<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="img/icon-192.png" sizes="192x192">
  <meta name="apple-mobile-web-app-title" content="AAC">
  <title>AAC - Flight School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <div class="offline-banner hidden" id="offline-banner">No internet connection - working offline</div>

  <!-- Sidebar -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-user" id="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div>
          <div class="sidebar-name" id="sidebar-name">No User</div>
          <div class="sidebar-role" id="sidebar-role">—</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link" data-view="dashboard"><span class="s-icon">&#127968;</span> Dashboard</a>
      <a href="#" class="sidebar-link" data-view="calendar"><span class="s-icon">&#128197;</span> Logbook</a>
      <a href="#" class="sidebar-link" data-view="attendance"><span class="s-icon">&#10003;</span> Crew</a>
      <a href="#" class="sidebar-link" data-view="notifications"><span class="s-icon">&#128276;</span> Alerts <span class="notif-badge-sm" id="sidebar-notif-badge" style="display:none"></span></a>
      <hr>
      <a href="#" class="sidebar-link" data-view="fuel"><span class="s-icon">&#9981;</span> Fuel Ops</a>
      <a href="#" class="sidebar-link" data-view="inventory"><span class="s-icon">&#128230;</span> Component Inventory</a>
      <a href="#" class="sidebar-link" id="sidebar-manage-ac"><span class="s-icon">&#9992;</span> Fleet Manager</a>
      <a href="#" class="sidebar-link" id="sidebar-theme"><span class="s-icon">&#127763;</span> <span id="sidebar-theme-label">Dark Mode</span></a>
      <a href="#" class="sidebar-link" id="sidebar-export"><span class="s-icon">&#128230;</span> Export Records</a>
      <a href="#" class="sidebar-link" id="sidebar-pincode" class="role-restricted"><span class="s-icon">&#128274;</span> Change PIN</a>
      <a href="#" class="sidebar-link" id="sidebar-reset" class="role-restricted"><span class="s-icon">&#128260;</span> Factory Reset</a>
      <hr>
      <div class="sidebar-inspections" id="sidebar-inspections">
        <div class="sidebar-insp-title">Inspections</div>
        <div id="sidebar-insp-list"></div>
      </div>
    </nav>
  </div>

  <header class="app-header">
    <div class="header-left">
      <button class="hamburger-btn" id="hamburger-btn">&#9776;</button>
    </div>
    <h1>AAC</h1>
    <div class="header-right">
      <button class="notif-bell-btn" id="notif-bell-btn" onclick="navigate('notifications')">
        <span class="nav-icon">&#128276;</span>
        <span class="notif-badge" id="notif-badge" style="display:none"></span>
      </button>
      <span class="ac-selector-wrap">
        <select id="ac-selector" class="ac-selector"></select>
      </span>
      <span class="sync-badge" id="sync-badge"></span>
    </div>
  </header>

  <div id="app"></div>

  <div id="toast" class="toast"></div>
  <input type="file" id="ac-photo-input" accept="image/*" style="display:none">

  <nav class="bottom-nav">
    <a href="#" class="nav-link" data-view="flight-ops">
      <span class="nav-icon">&#9992;</span>
      <span class="nav-label">Log Flights</span>
    </a>
    <a href="#" class="nav-link" data-view="defects">
      <span class="nav-icon">&#9888;</span>
      <span class="nav-label">Squawks</span>
    </a>
    <a href="#" class="nav-link active" data-view="dashboard">
      <span class="nav-icon">&#127968;</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="#" class="nav-link" data-view="maintenance">
      <span class="nav-icon">&#9881;</span>
      <span class="nav-label">Maintenance</span>
    </a>
    <a href="#" class="nav-link" data-view="fuel">
      <span class="nav-icon">&#9981;</span>
      <span class="nav-label">Fuel</span>
    </a>
    <a href="#" class="nav-link" data-view="inventory">
      <span class="nav-icon">&#128230;</span>
      <span class="nav-label">Parts</span>
    </a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="js/db.js?v=2"></script>
  <script src="js/sync.js?v=2"></script>
  <script src="js/flight-ops.js?v=2"></script>
  <script src="js/defects.js?v=2"></script>
  <script src="js/fuel.js?v=2"></script>
  <script src="js/maintenance.js?v=2"></script>
  <script src="js/inventory.js?v=2"></script>
  <script src="js/history.js?v=2"></script>
  <script src="js/attendance.js?v=2"></script>
  <script src="js/notifications.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
